# PI-Bench Leaderboard Submission Template
# Register your purple agent at https://agentbeats.dev before submission.
#
# PI-Bench exposes two public run modes:
#   1. Official full-set run:
#        scenario_scope = "all"
#
#   2. Domain-only debug run:
#        scenario_scope = "domain"
#        scenario_domain = "finra"    # or "retail" or "helpdesk"
#
# For comparable leaderboard submissions, use the official full-set run.

[green_agent]                                                                                                                                                        
agentbeats_id = "019c1699-60ff-7832-9a4b-e829f8fe8f16"                                                                                                               
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}" }                                                                                                                       
                                                                                                                                                                       
[[participants]]                                                                                                                                                     
agentbeats_id = "019d9285-c766-7290-8e31-32341e84d29b"
name = "agent"                                                                                                                                                       
agent_name = "STRIDE-Agent"                                                                                                                                          
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}" }
                                                                                                                                                                       
[config]        
scenario_scope = "all"                                                                                                                                                

# Optional concurrency for scenario execution.
# Keep this at 1 for the official leaderboard unless PI-Bench maintainers
# explicitly ask you to raise it. Higher values may hit model/API rate limits.
concurrency = 1

# Required only when scenario_scope = "domain".
# Options: "finra", "retail", "helpdesk"
# scenario_domain = "finra"

